# Nginx reverse proxy: admin.kynguyenhealthcare.com -> backend (port 3987)
# Backend: admin-kynguyen (docker-compose), NestJS API + Swagger + uploads
# HTTPS với Let's Encrypt; HTTP redirect sang HTTPS

upstream admin_backend {
    server 127.0.0.1:3987;
    keepalive 64;
}

# HTTP -> redirect sang HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name admin.kynguyenhealthcare.com;
    return 301 https://$server_name$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.kynguyenhealthcare.com;

    ssl_certificate     /etc/letsencrypt/live/admin.kynguyenhealthcare.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.kynguyenhealthcare.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/admin.kynguyen.access.log;
    error_log  /var/log/nginx/admin.kynguyen.error.log;
    client_max_body_size 50M;

    # API + Swagger (/api, /api/docs)
    location / {
        proxy_pass http://admin_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # File uploads (CV, v.v.) do backend phục vụ
    location /uploads/ {
        proxy_pass http://admin_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
