# Nginx reverse proxy: kynguyenhealthcare.com -> frontend (port 9987)
# Frontend: Next.js (docker-compose)
# HTTPS với Let's Encrypt; HTTP redirect sang HTTPS

upstream frontend {
    server 127.0.0.1:9987;
    keepalive 64;
}

# HTTP -> redirect sang HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name kynguyenhealthcare.com www.kynguyenhealthcare.com;
    return 301 https://kynguyenhealthcare.com$request_uri;
}

# www -> redirect sang non-www
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.kynguyenhealthcare.com;

    ssl_certificate     /etc/letsencrypt/live/kynguyenhealthcare.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kynguyenhealthcare.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://kynguyenhealthcare.com$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name kynguyenhealthcare.com;

    ssl_certificate     /etc/letsencrypt/live/kynguyenhealthcare.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kynguyenhealthcare.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/kynguyenhealthcare.access.log;
    error_log  /var/log/nginx/kynguyenhealthcare.error.log;
    client_max_body_size 50M;

    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Next.js static files
    location /_next/static/ {
        proxy_pass http://frontend;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Favicon, robots, sitemap, etc.
    location ~* \.(ico|txt|xml)$ {
        proxy_pass http://frontend;
    }
}
